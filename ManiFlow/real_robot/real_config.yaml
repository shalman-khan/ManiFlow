# =============================================================================
# Real Robot DP3 Configuration
# All topic names, paths, and parameters are configured here.
# =============================================================================

# ---------------------------------------------------------------------------
# ROS2 Topics — Observation (used during data collection and policy execution)
# ZED combined bags use depth+rgb images; robot/gripper topics are unchanged.
# ---------------------------------------------------------------------------
topics:
  depth:             /zed/zed_node/depth/depth_registered
  cam_info:          /zed/zed_node/depth/camera_info
  rgb:               /zed/zed_node/rgb/color/rect/image
  point_cloud:       /zed/zed_node/point_cloud/cloud_registered
  robot1_joints:     /robot1/joint_states
  robot2_joints:     /robot2/joint_states
  gripper1_joints:   /gripper1/joint_states
  gripper2_joints:   /gripper2/joint_states

# ---------------------------------------------------------------------------
# ROS2 Topics — Action (used during policy execution only)
# Robots use JointTrajectoryController — publishes JointTrajectory with 50ms horizon
# so the UR controller smoothly interpolates between DP3 steps instead of jerking.
# Grippers use Float64MultiArray passthrough to your gripper driver.
# ---------------------------------------------------------------------------
action_topics:
  robot1_command:    /robot1_joint_trajectory_controller/joint_trajectory
  robot2_command:    /robot2_joint_trajectory_controller/joint_trajectory
  gripper1_command:  /gripper1/cmd          # adjust to match your gripper driver
  gripper2_command:  /gripper2/cmd          # adjust to match your gripper driver

# ---------------------------------------------------------------------------
# Joint Names — canonical order used for agent_pos and action vectors
# DP3 agent_pos: [r1_pan, r1_lift, r1_elbow, r1_w1, r1_w2, r1_w3, g1, r2_pan, r2_lift, r2_elbow, r2_w1, r2_w2, r2_w3, g2]
# ---------------------------------------------------------------------------
joint_names:
  robot1:
    - robot1_shoulder_pan_joint
    - robot1_shoulder_lift_joint
    - robot1_elbow_joint
    - robot1_wrist_1_joint
    - robot1_wrist_2_joint
    - robot1_wrist_3_joint
  robot2:
    - robot2_shoulder_pan_joint
    - robot2_shoulder_lift_joint
    - robot2_elbow_joint
    - robot2_wrist_1_joint
    - robot2_wrist_2_joint
    - robot2_wrist_3_joint
  gripper1:
    - gripper1_finger_joint
  gripper2:
    - gripper2_finger_joint

