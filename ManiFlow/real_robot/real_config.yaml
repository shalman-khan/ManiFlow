# ---------------------------------------------------------------------------
# Data Processing
# ---------------------------------------------------------------------------
data:
  output_zarr:    /home/rosi/3D-Diffusion-Policy/3D-Diffusion-Policy/data/real_cable_pull_16june_thin_1024.zarr
  target_hz:      20
  n_points:       1024                # store at final resolution — matches task config point_cloud shape
  sync_tolerance_ms: 100              # max allowed time gap when syncing bags (ms)

# Point cloud workspace crop (camera optical frame, metres)
# Tune these to tightly bound your table workspace
workspace:
  x_min: -0.8
  x_max:  0.8
  y_min: -0.6
  y_max:  0.6
  z_min:  0.4   # must match z_filter_config.yaml used during training
  z_max:  1.1   # must match z_filter_config.yaml used during training

# Action — arms use joint deltas; the gripper is BINARY (open/close, no in-between).
action:
  max_joint_delta:   0.05   # ~3 deg per step at 20Hz; tune to your teleoperation style
  max_gripper_delta: 0.1    # (unused — gripper is now binary; kept for reference)
  gripper_closed_threshold: 0.4   # finger position ≥ this ⇒ "closed" (1); else "open" (0)

# ---------------------------------------------------------------------------
# Robots — IP addresses and types
# ---------------------------------------------------------------------------
robots:
  robot1:
    ip:   192.168.1.10
    type: ur10
    tf_prefix: robot1_
  robot2:
    ip:   192.168.1.20
    type: ur10e
    tf_prefix: robot2_

# ---------------------------------------------------------------------------
# Policy Execution
# ---------------------------------------------------------------------------
policy:
  checkpoint_path:  /home/rosi/3D-Diffusion-Policy/data/outputs/real_cable_pull/checkpoints/latest.ckpt
  task_config:      real_cable_pull
  n_action_steps:   8     # must match training n_action_steps
  inference_steps:  10    # DDIM steps at eval time
  obs_hz:           20    # observation polling rate (must match training control_freq)
  rtde_hz:          125   # RTDE polling rate
