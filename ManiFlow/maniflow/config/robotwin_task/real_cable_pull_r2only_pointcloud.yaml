name: real_cable_pull_r2only_pointcloud

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [1024, 6]
      type: point_cloud
    agent_pos:
      shape: [14]
      type: low_dim
  action:
    shape: [8]

env_runner:
  _target_: maniflow.env_runner.robot_runner.RobotRunner
  eval_episodes: 0
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  task_name: real_cable_pull_r2only

dataset:
  _target_: maniflow.dataset.robotwin_dataset.RoboTwinDataset
  zarr_path: /home/rosi/3D-Diffusion-Policy/3D-Diffusion-Policy/data/real_cable_pull_r2only_1024.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.05
  max_train_episodes: null
  use_pc_color: ${policy.use_pc_color}
  pointcloud_color_aug_cfg:
    aug_color: true
    prob: 0.2
    params: [0.3, 0.4, 0.5, 0.08]
